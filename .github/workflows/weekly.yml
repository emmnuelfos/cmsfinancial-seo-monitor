name: CMS Prime weekly SEO monitor

on:
  schedule:
    # Runs every Monday at 09:00 UTC (13:00 Dubai time)
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the updated docs/data/*.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth

      - name: Write GSC service-account credentials
        env:
          GSC_CREDS_JSON: ${{ secrets.GSC_CREDS_JSON }}
        run: |
          mkdir -p secrets
          echo "$GSC_CREDS_JSON" > secrets/cmsprime-gsc-creds.json
          echo "GSC_CREDS_PATH=$(pwd)/secrets/cmsprime-gsc-creds.json" >> $GITHUB_ENV

      - name: Run weekly monitor
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: python monitor.py

      - name: Run QA regression check
        # continue-on-error so a regression alert doesn't block the dashboard data commit.
        # The script exits 1 on unexpected failures; we record that as a job warning and
        # the dashboard's qa-status.json badge surfaces the failure visually.
        continue-on-error: true
        id: qa
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python qa/regression_check.py

      - name: Commit updated dashboard data + QA results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json qa/results-*.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): auto-update dashboard data + QA $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Flag QA regression in run output
        if: steps.qa.outcome == 'failure'
        run: |
          echo "::warning::QA regression check reported unexpected failures. See docs/data/qa-status.json and the 'QA History' tab in the Google Sheet."

      - name: Archive audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}
          path: audit_*.json
          retention-days: 90
